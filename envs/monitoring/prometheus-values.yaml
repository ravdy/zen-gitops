grafana:
  adminPassword: pharma-grafana-2026
  persistence:
    enabled: true
    existingClaim: grafana
    size: 10Gi
    storageClassName: gp2-csi
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - monitoring.pharma.internal
    paths:
      - /
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
  plugins:
    - grafana-piechart-panel
    - grafana-worldmap-panel
  # Pre-provision dashboards from Grafana.com
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: Pharma
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      fluent-bit:
        gnetId: 7752
        revision: 1
        datasource: Prometheus

alertmanager:
  enabled: true
  config:
    route:
      group_by: ["alertname", "cluster", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "slack-sre-ops"
      routes:
        - match:
            severity: critical
          receiver: "slack-sre-ops"
    receivers:
      - name: "slack-sre-ops"
        slack_configs:
          - api_url_secret:
              name: alertmanager-slack-webhook
              key: url
            channel: "#SRE_OPS"
            send_resolved: true
            title: '{{ if eq .Status "firing" }}:red_circle: FIRING{{ else }}:large_green_circle: RESOLVED{{ end }} {{ .CommonLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Severity:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              {{ end }}
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2-csi
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "8GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2-csi
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1200Mi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
