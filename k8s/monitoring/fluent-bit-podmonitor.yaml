apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: fluent-bit
  namespace: monitoring
  labels:
    app: fluent-bit
    release: monitoring
spec:
  # Scrape Fluent Bit pods in the dev namespace
  namespaceSelector:
    matchNames:
      - dev
  selector:
    matchLabels:
      app: fluent-bit
  podMetricsEndpoints:
    - port: http
      path: /api/v1/metrics/prometheus
      interval: 30s
      scrapeTimeout: 10s
